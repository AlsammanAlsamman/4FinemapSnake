evidances:
  snplist: "inputs/evidance_snps_list.txt"

# Global filters and behavior.
filters:
  refpanel_maf_min: 0.01
  gwas_pvalue_threshold: 5e-8
  matrix_symmetry_tolerance: 1e-6

diagnostics:
  ldscore_plot_enabled: true
  require_ldscore_correlation: false
  min_ldscore_p_correlation: 0.05

finemap_params:
  max_causal: 10
  credible_set_coverage: 0.95

susie_params:
  L: 10
  coverage: 0.95
  window_kb: 250

cojo_params:
  pvalue_cutoff: 5e-8
  max_iterations: 25

coloc_params:
  cojo_keep_label: "iter1"
  # Posterior probability thresholds for colocalization signal
  pp_h4_threshold: 0.75      # ABF PP.H4 threshold for reporting colocalization
  pp_h4_credible_set: 0.95   # Threshold for 95% credible set (cumulative PP)
  # Analysis options
  analysis_type: "quant"     # Type of analysis: "quant" for quantitative, "cc" for case-control
  maf_filter: null           # Optional: Filter eQTLs by MAF; null = no filter
  # Output options
  output_all_hits: true      # Output all pairs including non-significant (PP.H4 < threshold)
  include_credible_set: true # Include credible set annotations in output

# Step 4b (significant SNP LD clustering)
clustering_LD:
  sig_ld_cluster_r2_threshold: 0.2
  sig_distance_cluster_r2_threshold: 50 #kbp

default_resources:
  mem_mb: 32000
  cores: 2
  time: "00:30:00"

targets:
  disc:
    gwaspath: "inputs/Disc.tsv"
    loci: "inputs/UBASH3A.txt"
    refpanel: EAS
    samplesize: 85987
  asian:
    gwaspath: "inputs/Asian.tsv"
    loci: "inputs/UBASH3A.txt"
    refpanel: EAS
    samplesize: 159219

